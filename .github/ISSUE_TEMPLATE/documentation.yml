name: 📝 Documentation Issue
description: Report missing, outdated, or incorrect documentation
title: "[Docs]: "
labels: ["documentation"]
assignees: []

body:
  - type: dropdown
    id: doc-type
    attributes:
      label: 📂 Documentation Type
      options:
        - README
        - API Documentation
        - Setup / Installation Guide
        - Architecture Docs
        - Contributing Guide
        - Code Comments / JSDoc
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Description
      description: What is missing, wrong, or unclear in the documentation?
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: 🔗 Location
      description: Link or path to the affected documentation.
      placeholder: e.g. docs/architecture.md or README.md#installation

  - type: textarea
    id: suggested-change
    attributes:
      label: ✏️ Suggested Change
      description: What should the documentation say instead? 
       
  - type: checkboxes
    id: gssoc
    attributes:
      label: GSSoC '26
      options:
        - label: I am contributing under GSSoC '26
