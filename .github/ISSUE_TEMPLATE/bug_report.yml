name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Recovera
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below as thoroughly as possible.

  - type: checkboxes
    id: existing-issue
    attributes:
      label: Pre-flight Checklist
      description: Please confirm before submitting.
      options:
        - label: I have searched existing issues and this bug has not been reported yet.
          required: true
        - label: I have read the [Contributing Guidelines](../../README.md#-contributing).
          required: true

  - type: textarea
    id: description
    attributes:
      label: 🐛 Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 🔁 Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: ✅ Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: ❌ Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 📸 Screenshots / Logs
      description: Add screenshots, error logs, or stack traces if applicable.
      placeholder: Paste logs or drag-and-drop screenshots here.

  - type: dropdown
    id: affected-area
    attributes:
      label: 🗂️ Affected Area
      description: Which part of Recovera is affected?
      options:
        - Ingestion / Log Pipeline
        - Anomaly Detection
        - AI Root Cause Analysis (RCA)
        - Safety / Policy Engine
        - Auto-Remediation / PR Generation
        - Dashboard / UI
        - AWS Integration
        - GitHub Integration
        - Authentication
        - Database / Prisma
        - Other
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: e.g. 18.17.0

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Ubuntu 22.04, macOS 14, Windows 11

  - type: textarea
    id: additional-context
    attributes:
      label: 📋 Additional Context
      description: Any other context about the problem.  
      
  - type: checkboxes
    id: gssoc
    attributes:
      label: GSSoC '26
      options:
        - label: I am contributing under GSSoC '26
